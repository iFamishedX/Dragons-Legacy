name: Publish Wiki

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
  workflow_dispatch:

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Push wiki pages to GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" /tmp/wiki

          rsync -a --delete --exclude='.git' wiki/ /tmp/wiki/

          cd /tmp/wiki
          git add .
          if git diff --staged --quiet; then
            echo "No wiki changes to publish."
          else
            git commit -m "Update wiki from source (ref: ${{ github.sha }})"
            git push
          fi
