name: Release Dragon's Legacy

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Extract versions
        id: versions
        run: |
          MOD_ID=$(grep '^mod_id=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
          MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
          MC_VERSION=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
          echo "mod_id=$MOD_ID" >> $GITHUB_OUTPUT
          echo "mod_version=$MOD_VERSION" >> $GITHUB_OUTPUT
          echo "mc_version=$MC_VERSION" >> $GITHUB_OUTPUT

      - name: Determine release metadata
        id: meta
        run: |
          MOD_ID="${{ steps.versions.outputs.mod_id }}"
          MOD_VERSION="${{ steps.versions.outputs.mod_version }}"
          MC_VERSION="${{ steps.versions.outputs.mc_version }}"
          echo "jar_name=${MOD_ID}_${MOD_VERSION}+${MC_VERSION}.jar" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=v${MOD_VERSION}" >> $GITHUB_OUTPUT
          fi
          if [[ "$MOD_VERSION" == *-dev* ]] || [[ "$MOD_VERSION" == *-alpha* ]] || [[ "$MOD_VERSION" == *-beta* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ steps.meta.outputs.is_prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ steps.meta.outputs.tag_name }}" \
            --title "Dragon's Legacy ${{ steps.versions.outputs.mod_version }}" \
            $PRERELEASE_FLAG \
            "build/libs/${{ steps.meta.outputs.jar_name }}"
