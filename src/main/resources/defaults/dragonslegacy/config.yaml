# Dragon's Legacy unified configuration

egg:
  search_radius: 25
  block_ender_chest: true
  block_container_items: false
  offline_reset_days: 3
  nearby_range: 64
  visibility:
    INVENTORY: "EXACT"
    ITEM: "EXACT"
    PLAYER: "HIDDEN"
    BLOCK: "RANDOMIZED"
    FALLING_BLOCK: "EXACT"
    ENTITY: "EXACT"

ability:
  duration_ticks: 6000
  cooldown_ticks: 1200
  block_elytra: true
  effects:
    - id: "strength"
      amplifier: 1
      show_particles: true
      show_icon: true
    - id: "speed"
      amplifier: 1
      show_particles: true
      show_icon: true
  attributes:
    - id: "max_health"
      amount: 20.0
      operation: "add_value"
    - id: "attack_damage"
      amount: 4.0
      operation: "add_value"

passive:
  effects:
    - id: "resistance"
      amplifier: 0
      show_particles: false
      show_icon: false
    - id: "saturation"
      amplifier: 0
      show_particles: false
      show_icon: false
  attributes:
    - id: "max_health"
      amount: 4.0
      operation: "add_value"

commands:
  root: "dragonslegacy"
  aliases:
    - "dl"
  subcommands:
    help: "help"
    bearer: "bearer"
    hunger: "hunger"
    hunger_on: "on"
    hunger_off: "off"
