config_version: 1

# =============================================================================
# Dragon's Legacy — Global Configuration
# =============================================================================
#
# All commands are always registered with Brigadier.
# Permission checks are enforced inside each command handler.
#
# Set enabled: false for any command to disable it for all users.
# Admin commands (info, setbearer, clearability, resetcooldown, reload, papitest)
# always require operator-level permission regardless of this toggle.
# =============================================================================

commands:
  root: "dragonslegacy"
  aliases:
    - "dl"

  help:
    enabled: true

  bearer:
    enabled: true

  hunger:
    enabled: true

  reload:
    enabled: true

  placeholders:
    enabled: true
