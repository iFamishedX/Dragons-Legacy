# Dragon's Legacy messages configuration

use_minimessage: true

output_modes:
  help: "chat"
  bearer_info: "chat"
  bearer_none: "chat"
  hunger_activate: "title"
  hunger_deactivate: "title"
  hunger_expired: "title"
  not_bearer: "actionbar"
  elytra_blocked: "actionbar"
  announcement_egg_picked_up: "chat"
  announcement_egg_dropped: "chat"
  announcement_egg_placed: "chat"
  announcement_bearer_changed: "chat"
  announcement_bearer_cleared: "chat"
  announcement_egg_teleported: "chat"
  announcement_ability_activated: "chat"
  announcement_ability_expired: "chat"
  announcement_ability_cooldown_started: "chat"
  announcement_ability_cooldown_ended: "chat"

text:
  help: |

    /dragonslegacy help
    /dragonslegacy bearer
    /dragonslegacy hunger on
    /dragonslegacy hunger off

  bearer_info: "<yellow>The %deg:item% is held by <gold>%deg:bearer%</>."
  bearer_none: "<yellow>No one holds the %deg:item% yet.</yellow>"

  hunger_activate: "<#FF4500><bold>Dragon's Hunger!</bold>"
  hunger_deactivate: "<gray><italic>Dragon's Hunger fades...</italic></gray>"
  hunger_expired: "<gray><italic>Dragon's Hunger has ended.</italic></gray>"

  not_bearer: "<red>You are not the Dragon Egg bearer!</red>"
  elytra_blocked: "<red>You cannot use an elytra while Dragon's Hunger is active!</red>"

  announcement_egg_picked_up: "<gold>[Dragon's Legacy]</gold> <player> picked up the egg."
  announcement_egg_dropped: "<gold>[Dragon's Legacy]</gold> The egg was dropped."
  announcement_egg_placed: "<gold>[Dragon's Legacy]</gold> Egg placed at <x>, <y>, <z>."
  announcement_bearer_changed: "<gold>[Dragon's Legacy]</gold> New bearer: <player>."
  announcement_bearer_cleared: "<gold>[Dragon's Legacy]</gold> The egg has no bearer."
  announcement_egg_teleported: "<gold>[Dragon's Legacy]</gold> Egg returned to spawn."
  announcement_ability_activated: "<gold>[Dragon's Legacy]</gold> <player> activated Dragon's Hunger."
  announcement_ability_expired: "<gold>[Dragon's Legacy]</gold> Dragon's Hunger expired."
  announcement_ability_cooldown_started: "<gold>[Dragon's Legacy]</gold> Ability cooldown started."
  announcement_ability_cooldown_ended: "<gold>[Dragon's Legacy]</gold> Ability ready."
