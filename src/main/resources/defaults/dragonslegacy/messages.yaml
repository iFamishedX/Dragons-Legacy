config_version: 1

prefix: ""

# =============================================================================
# Dragon's Legacy — Message Configuration (NEW FORMAT)
# =============================================================================
#
# MiniMessage is always enabled.
# PlaceholderAPI is always enabled.
# Dragon's Legacy placeholders are always enabled.
#
# Each message:
#   enabled: true/false
#   cooldown_ticks: per-player cooldown (ticks)
#   global_cooldown_ticks: global cooldown (ticks)
#   conditions: map of booleans (all must be true)
#
#   channels:
#     channel_name:
#       mode:     chat | actionbar | title | subtitle | bossbar
#       audience: everyone | bearer_only | everyone_except_bearer |
#                 executor_only | everyone_except_executor
#       priority: integer (higher fires first, default 0)
#       delay:    ticks to wait before sending (default 0)
#       text:     "<MiniMessage text>"
# =============================================================================

messages:
  help:
    enabled: true
    cooldown_ticks: 0
    global_cooldown_ticks: 0
    conditions: {}
    channels:
      main:
        mode: chat
        audience: everyone
        priority: 0
        delay: 0
        text: |
          %dragonslegacy:global_prefix% <gold><bold>Dragon's Legacy Commands</bold></gold>
          /dragonslegacy help
          /dragonslegacy bearer
          /dragonslegacy hunger on
          /dragonslegacy hunger off

  bearer_info:
    enabled: true
    cooldown_ticks: 0
    global_cooldown_ticks: 0
    conditions: {}
    channels:
      main:
        mode: chat
        audience: everyone
        priority: 0
        delay: 0
        text: "%dragonslegacy:global_prefix% <yellow>The Dragon Egg is held by <gold>%dragonslegacy:bearer%</gold>.</yellow>"

  bearer_none:
    enabled: true
    cooldown_ticks: 0
    global_cooldown_ticks: 0
    conditions: {}
    channels:
      main:
        mode: chat
        audience: everyone
        priority: 0
        delay: 0
        text: "%dragonslegacy:global_prefix% <yellow>No one holds the Dragon Egg yet.</yellow>"

  ability_activated:
    enabled: true
    cooldown_ticks: 0
    global_cooldown_ticks: 0
    conditions:
      ability_active: true
    channels:
      title:
        mode: title
        audience: bearer_only
        priority: 10
        delay: 0
        text: "<#FF4500><bold>Dragon's Hunger!</bold>"
      broadcast:
        mode: chat
        audience: everyone
        priority: 0
        delay: 0
        text: "%dragonslegacy:global_prefix% %dragonslegacy:player% activated Dragon's Hunger."

  ability_deactivated:
    enabled: true
    cooldown_ticks: 0
    global_cooldown_ticks: 0
    conditions:
      ability_active: false
    channels:
      title:
        mode: title
        audience: bearer_only
        priority: 0
        delay: 0
        text: "<gray><italic>Dragon's Hunger fades...</italic></gray>"

  ability_expired:
    enabled: true
    cooldown_ticks: 0
    global_cooldown_ticks: 0
    conditions:
      ability_active: false
    channels:
      title:
        mode: title
        audience: bearer_only
        priority: 10
        delay: 0
        text: "<gray><italic>Dragon's Hunger has ended.</italic></gray>"
      broadcast:
        mode: chat
        audience: everyone
        priority: 0
        delay: 0
        text: "%dragonslegacy:global_prefix% Dragon's Hunger expired."

  ability_cooldown_started:
    enabled: true
    cooldown_ticks: 0
    global_cooldown_ticks: 0
    conditions: {}
    channels:
      main:
        mode: chat
        audience: everyone
        priority: 0
        delay: 0
        text: "%dragonslegacy:global_prefix% Ability cooldown started."

  ability_cooldown_ended:
    enabled: true
    cooldown_ticks: 0
    global_cooldown_ticks: 0
    conditions: {}
    channels:
      main:
        mode: chat
        audience: everyone
        priority: 0
        delay: 0
        text: "%dragonslegacy:global_prefix% Ability ready."

  not_bearer:
    enabled: true
    cooldown_ticks: 20
    global_cooldown_ticks: 0
    conditions:
      executor_is_not_bearer: true
    channels:
      main:
        mode: actionbar
        audience: executor_only
        priority: 0
        delay: 0
        text: "<red>You are not the Dragon Egg bearer!</red>"

  elytra_blocked:
    enabled: true
    cooldown_ticks: 20
    global_cooldown_ticks: 0
    conditions:
      ability_active: true
    channels:
      main:
        mode: actionbar
        audience: bearer_only
        priority: 0
        delay: 0
        text: "<red>You cannot use an elytra while Dragon's Hunger is active!</red>"

  egg_picked_up:
    enabled: true
    cooldown_ticks: 0
    global_cooldown_ticks: 0
    conditions:
      egg_held: true
    channels:
      main:
        mode: chat
        audience: everyone
        priority: 0
        delay: 0
        text: "%dragonslegacy:global_prefix% %dragonslegacy:player% picked up the Dragon Egg."

  egg_dropped:
    enabled: true
    cooldown_ticks: 0
    global_cooldown_ticks: 0
    conditions:
      egg_dropped: true
    channels:
      main:
        mode: chat
        audience: everyone
        priority: 0
        delay: 0
        text: "%dragonslegacy:global_prefix% The Dragon Egg was dropped."

  egg_placed:
    enabled: true
    cooldown_ticks: 0
    global_cooldown_ticks: 0
    conditions:
      egg_placed: true
    channels:
      main:
        mode: chat
        audience: everyone
        priority: 0
        delay: 0
        text: "%dragonslegacy:global_prefix% Dragon Egg placed at %dragonslegacy:exact-xyz%."

  egg_teleported:
    enabled: true
    cooldown_ticks: 0
    global_cooldown_ticks: 0
    conditions: {}
    channels:
      main:
        mode: chat
        audience: everyone
        priority: 0
        delay: 0
        text: "%dragonslegacy:global_prefix% Dragon Egg returned to spawn."

  bearer_changed:
    enabled: true
    cooldown_ticks: 0
    global_cooldown_ticks: 0
    conditions:
      bearer_changed: true
    channels:
      main:
        mode: chat
        audience: everyone
        priority: 0
        delay: 0
        text: "%dragonslegacy:global_prefix% New bearer: %dragonslegacy:bearer%."

  bearer_cleared:
    enabled: true
    cooldown_ticks: 0
    global_cooldown_ticks: 0
    conditions:
      bearer_changed: true
    channels:
      main:
        mode: chat
        audience: everyone
        priority: 0
        delay: 0
        text: "%dragonslegacy:global_prefix% The Dragon Egg has no bearer."
